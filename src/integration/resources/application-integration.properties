server.port=8081
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS MYBIKE

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

#logging.level.root=debug

logging.level.root=INFO
logging.level.org.flywaydb=TRACE
logging.level.org.flywaydb.core=TRACE
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

